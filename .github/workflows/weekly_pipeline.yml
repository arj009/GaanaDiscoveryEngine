name: Weekly Gaana Discovery Pipeline

on:
  schedule:
    # 7 AM IST is 1:30 AM UTC
    - cron: '30 1 * * 1'
  workflow_dispatch: # Allows you to run it manually

jobs:
  run-data-pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Dependencies
      run: |
        cd gaana-discovery-engine
        npm install
      
    - name: Run Data Pipeline
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
        GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
        GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
        GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
        GROQ_API_KEY_5: ${{ secrets.GROQ_API_KEY_5 }}
        TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
      run: |
        cd gaana-discovery-engine
        node ingestion/scraper.js
        node processing/classify.js
        node processing/aggregate.js
        node processing/synthesize_needs.js
        
    - name: Commit Updated Data
      run: |
        git config --global user.name "Gaana Pipeline Bot"
        git config --global user.email "bot@gaana.com"
        git add gaana-discovery-engine/data/*.json
        git commit -m "chore: automated weekly data refresh [skip ci]" || echo "No changes to commit"
        git push
