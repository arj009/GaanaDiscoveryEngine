name: Weekly Dashboard Update

on:
  schedule:
    # 07:00 AM IST = 01:30 AM UTC (IST is UTC+5:30)
    - cron: '30 1 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install processing dependencies
        run: |
          echo "Installing processing dependencies..."
          pip install transformers torch sentence-transformers groq langdetect pydantic python-dotenv sqlalchemy psycopg2-binary pinecone
          echo "Verifying installation..."
          pip list
      
      - name: Run processing pipeline on existing data
        run: |
          cd gaana-discovery-engine/processing
          if [ -f "../ingestion/raw_reviews_dump.json" ]; then
            echo "Processing existing raw_reviews_dump.json..."
            python pipeline.py
          else
            echo "No raw_reviews_dump.json found - skipping processing"
          fi
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      
      - name: Store reviews to PostgreSQL
        run: |
          cd gaana-discovery-engine/processing
          python store_to_postgres.py
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
      
      - name: Index reviews to Pinecone
        run: |
          cd gaana-discovery-engine/processing
          python index_to_pinecone.py
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_ENVIRONMENT: ${{ secrets.PINECONE_ENVIRONMENT }}
          PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
      
      - name: Copy enriched reviews to dashboard
        run: |
          cp gaana-discovery-engine/processing/enriched_reviews.json gaana-discovery-engine/dashboard/public/enriched_reviews.json
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add gaana-discovery-engine/processing/enriched_reviews.json
          git add gaana-discovery-engine/dashboard/public/enriched_reviews.json
          git add gaana-discovery-engine/ingestion/raw_reviews_dump.json
          git commit -m "Weekly dashboard update - $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
