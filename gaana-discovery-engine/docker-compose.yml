version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gaana_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gaana_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gaana_pass}
      POSTGRES_DB: ${POSTGRES_DB:-gaana_discovery}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gaana_user} -d ${POSTGRES_DB:-gaana_discovery}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gaana_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
