services:
  - type: web
    name: gaana-discovery-api
    runtime: python
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: POSTGRES_USER
        fromDatabase:
          name: gaana-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: gaana-postgres
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: gaana-postgres
          property: database
      - key: POSTGRES_HOST
        fromDatabase:
          name: gaana-postgres
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: gaana-postgres
          property: port
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_ENVIRONMENT
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: TWITTER_API_KEY
        sync: false
      - key: TWITTER_API_SECRET
        sync: false
databases:
  - name: gaana-postgres
    databaseName: gaana_discovery
    user: gaana_user
